<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Compose and publish LinkedIn posts with media attachments">
  <title>LinkedIn Post Composer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/compose/styles">
</head>
<body>
  <!-- Header -->
  <header class="header" id="app-header">
    <div class="header__inner">
      <div class="header__brand">
        <svg class="header__logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="4" fill="#0A66C2"/>
          <path d="M7.5 9.5h-2v7h2v-7zM6.5 8.5a1.15 1.15 0 100-2.3 1.15 1.15 0 000 2.3zM18.5 16.5h-2v-3.4c0-.85-.02-1.95-1.2-1.95-1.2 0-1.38.93-1.38 1.89v3.46h-2v-7h1.92v.96h.03a2.1 2.1 0 011.9-1.05c2.04 0 2.41 1.34 2.41 3.08v4.01h.32z" fill="white"/>
        </svg>
        <h1 class="header__title">Post Composer</h1>
      </div>
      <span class="header__badge">Manual Post</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="main-content">
    <div class="layout">
      <!-- Compose Panel -->
      <section class="compose-panel glass-card" id="compose-section">
        <h2 class="compose-panel__title">Create Your Post</h2>

        <!-- Text Editor -->
        <div class="editor" id="text-editor">
          <textarea
            id="post-text"
            class="editor__textarea"
            placeholder="What do you want to talk about?"
            maxlength="3000"
            rows="8"
          ></textarea>

          <!-- Formatting Toolbar -->
          <div class="toolbar" id="formatting-toolbar">
            <div class="toolbar__group toolbar__group--format">
              <button class="toolbar__btn" id="btn-bold" type="button" title="Bold (𝗕)" data-format="bold">
                <strong>B</strong>
              </button>
              <button class="toolbar__btn" id="btn-italic" type="button" title="Italic (𝘐)" data-format="italic">
                <em>I</em>
              </button>
              <button class="toolbar__btn" id="btn-underline" type="button" title="Underline (U̲)" data-format="underline">
                <span style="text-decoration:underline">U</span>
              </button>
              <button class="toolbar__btn" id="btn-strikethrough" type="button" title="Strikethrough (S̶)" data-format="strikethrough">
                <span style="text-decoration:line-through">S</span>
              </button>
            </div>

            <div class="toolbar__divider"></div>

            <div class="toolbar__group toolbar__group--fonts">
              <button class="toolbar__btn toolbar__btn--font" id="btn-monospace" type="button" title="Monospace (𝚖𝚘𝚗𝚘)" data-format="monospace">
                𝙼
              </button>
              <button class="toolbar__btn toolbar__btn--font" id="btn-script" type="button" title="Script / Cursive (𝓈𝒸𝓇𝒾𝓅𝓉)" data-format="script">
                𝓢
              </button>
              <button class="toolbar__btn toolbar__btn--font" id="btn-doublestruck" type="button" title="Double-Struck (𝕕𝕠𝕦𝕓𝕝𝕖)" data-format="doublestruck">
                𝔻
              </button>
              <button class="toolbar__btn toolbar__btn--font" id="btn-fraktur" type="button" title="Fraktur / Gothic (𝔣𝔯𝔞𝔨𝔱𝔲𝔯)" data-format="fraktur">
                𝔉
              </button>
              <button class="toolbar__btn toolbar__btn--font" id="btn-circled" type="button" title="Circled (ⓒⓘⓡⓒⓛⓔⓓ)" data-format="circled">
                Ⓒ
              </button>
              <button class="toolbar__btn toolbar__btn--font" id="btn-squared" type="button" title="Squared (🅂🅀🅄🄰🅁🄴🄳)" data-format="squared">
                🅂
              </button>
            </div>

            <div class="toolbar__divider"></div>

            <div class="toolbar__group toolbar__group--extras">
              <button class="toolbar__btn toolbar__btn--emoji" id="btn-emoji" type="button" title="Insert Emoji">
                😊
              </button>
              <button class="toolbar__btn" id="btn-hashtag" type="button" title="Insert Hashtag">
                #
              </button>
              <button class="toolbar__btn" id="btn-linebreak" type="button" title="Insert Line Separator">
                ¶
              </button>
            </div>
          </div>

          <!-- Emoji Picker Popover -->
          <div class="emoji-picker" id="emoji-picker">
            <div class="emoji-picker__header">
              <input type="text" class="emoji-picker__search" id="emoji-search" placeholder="Search emoji..." />
            </div>
            <div class="emoji-picker__tabs" id="emoji-tabs"></div>
            <div class="emoji-picker__grid" id="emoji-grid"></div>
          </div>

          <div class="editor__footer">
            <span class="toolbar__hint" id="toolbar-hint"></span>
            <span class="editor__charcount" id="char-count">0 / 3,000</span>
          </div>
        </div>

        <!-- Media Upload -->
        <div class="media-upload" id="media-upload">
          <div class="media-upload__dropzone" id="dropzone">
            <svg class="media-upload__icon" viewBox="0 0 48 48" fill="none">
              <rect x="4" y="8" width="40" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
              <circle cx="16" cy="20" r="4" stroke="currentColor" stroke-width="2"/>
              <path d="M4 32l10-10 8 8 6-6 16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M30 18l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="34" y1="14" x2="34" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <p class="media-upload__text">Drag & drop images or video here</p>
            <p class="media-upload__subtext">or click to browse files</p>
            <input
              type="file"
              id="file-input"
              class="media-upload__input"
              multiple
              accept="image/*,video/*"
            >
          </div>
          <div class="media-upload__preview" id="media-preview"></div>
          <p class="media-upload__hint" id="media-hint">Images: up to 9 (max 10MB each) · Video: 1 (max 200MB)</p>
        </div>

        <!-- Actions -->
        <div class="compose-actions" id="compose-actions">
          <button class="btn btn--secondary" id="btn-clear" type="button">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
            Clear
          </button>
          <button class="btn btn--primary" id="btn-post" type="button" disabled>
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
            </svg>
            Post to LinkedIn
          </button>
        </div>
      </section>

      <!-- Preview Panel -->
      <section class="preview-panel" id="preview-section">
        <h2 class="preview-panel__title">Post Preview</h2>
        <div class="linkedin-card glass-card" id="linkedin-preview">
          <!-- Profile Header -->
          <div class="linkedin-card__header">
            <div class="linkedin-card__avatar" id="preview-avatar">
              <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="#374151"/>
                <circle cx="20" cy="16" r="7" fill="#6B7280"/>
                <ellipse cx="20" cy="32" rx="12" ry="8" fill="#6B7280"/>
              </svg>
            </div>
            <div class="linkedin-card__meta">
              <span class="linkedin-card__name">You</span>
              <span class="linkedin-card__headline">LinkedIn User</span>
              <span class="linkedin-card__time">Just now · <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm3.5 8.5h-4a.5.5 0 01-.5-.5V3.5a.5.5 0 011 0V7.5h3.5a.5.5 0 010 1z"/></svg></span>
            </div>
          </div>

          <!-- Post Body -->
          <div class="linkedin-card__body" id="preview-body">
            <p class="linkedin-card__placeholder">Your post preview will appear here...</p>
          </div>

          <!-- Media Preview -->
          <div class="linkedin-card__media" id="preview-media"></div>

          <!-- Reactions Bar -->
          <div class="linkedin-card__reactions">
            <div class="linkedin-card__reaction-icons">
              <span class="reaction-dot reaction-dot--like"></span>
              <span class="reaction-dot reaction-dot--celebrate"></span>
              <span class="reaction-dot reaction-dot--love"></span>
            </div>
            <div class="linkedin-card__actions-bar">
              <button class="linkedin-action" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.46 11l-3.91-3.91a.996.996 0 10-1.41 1.41L16.59 11H2a1 1 0 000 2h14.59l-2.45 2.5a.996.996 0 000 1.41.996.996 0 001.41 0L19.46 13a1.37 1.37 0 000-2z"/></svg>
                Like
              </button>
              <button class="linkedin-action" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 9h10v1H7z M7 12h7v1H7z M20 2H4a2 2 0 00-2 2v12a2 2 0 002 2h14l4 4V4a2 2 0 00-2-2z"/></svg>
                Comment
              </button>
              <button class="linkedin-action" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M23 12l-4.6 7H5.6L1 12l4.6-7h12.8L23 12zM12 15a3 3 0 100-6 3 3 0 000 6z"/></svg>
                Repost
              </button>
              <button class="linkedin-action" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M21 3L0 10l7.66 4.26L14 8l-6.26 6.34L12 21l9-18z"/></svg>
                Send
              </button>
            </div>
          </div>
        </div>

        <!-- Status Toast -->
        <div class="toast" id="toast" role="alert" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p class="loading-text">Publishing to LinkedIn...</p>
    </div>
  </div>

  <script src="/compose/unicode-fonts"></script>
  <script src="/compose/emoji-data"></script>
  <script src="/compose/media-upload"></script>
  <script src="/compose/script"></script>
</body>
</html>
